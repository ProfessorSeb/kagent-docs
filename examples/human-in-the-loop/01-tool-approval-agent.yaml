# Example: Agent with Tool Approval
#
# This agent can read, write, and delete files. Read operations execute
# immediately, but write and delete require user approval in the UI.
#
# To try it:
#   1. Apply the Secret and ModelConfig first
#   2. Apply this Agent
#   3. Open the kagent UI and chat with the agent
#   4. Ask it to delete or write a file — you'll see Approve/Reject buttons
#
# Usage:
#   kubectl apply -f 01-tool-approval-agent.yaml

---
apiVersion: v1
kind: Secret
metadata:
  name: openai-key
type: Opaque
stringData:
  api-key: "${OPENAI_API_KEY}"  # Replace with your actual key
---
apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: gpt4o
spec:
  provider: OpenAI
  model: gpt-4o
  apiKeySecretRef:
    name: openai-key
    key: api-key
---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: safe-file-agent
spec:
  type: Declarative
  declarative:
    modelConfig: gpt4o
    systemMessage: |
      You are a file management agent. You can read, write, and delete files.

      IMPORTANT: Write and delete operations require user approval. The user
      will see what you're about to do and can approve or reject it.

      Always explain what you plan to do before attempting file operations.
    tools:
      - type: McpServer
        mcpServer:
          name: filesystem-server
          toolNames:
            - read_file
            - write_file
            - delete_file
            - list_directory
          requireApproval:
            - write_file
            - delete_file
